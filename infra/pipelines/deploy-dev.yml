# CD — every merge to develop builds, tests, pushes images, provisions DEV (Bicep),
# and deploys api/worker (Container Apps) + SPA (Static Web App). DEV is the continuous-review env.
#
# Owner prerequisites (one-time):
#   - DevOps Environment "rplus-dev" (approval gates as desired).
#   - Variable group "rplus-dev" with secret POSTGRES_ADMIN_PASSWORD.
#   - User-assigned MI "id-rplus-dev" in rg-rplus-dev, granted AcrPull on the ACR (see Azure_Foundation.md).
#   - variables/variables.dev.yml: azureServiceConnection + acrName verified.

trigger:
  branches:
    include:
      - develop
  paths:
    exclude:
      - Docs/**
      - '**/*.md'
      - .gitignore

pool:
  vmImage: ubuntu-latest

variables:
  - template: variables/variables.dev.yml
  - group: rplus-dev # secret: POSTGRES_ADMIN_PASSWORD

stages:
  - stage: build
    displayName: Build, test, push images
    jobs:
      - job: backend
        displayName: Backend test + push images
        steps:
          - template: templates/build-dotnet.yml
          - task: AzureCLI@2
            displayName: Build & push container images
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az acr login --name $(acrName)
                dotnet publish src/api/RotationsPlus.Api/RotationsPlus.Api.csproj -c Release \
                  -p:PublishProfile=DefaultContainer \
                  -p:ContainerRegistry=$(acrLoginServer) \
                  -p:ContainerRepository=rplus-api \
                  -p:ContainerImageTag=$(Build.BuildId)
                dotnet publish src/worker/RotationsPlus.Worker/RotationsPlus.Worker.csproj -c Release \
                  -p:PublishProfile=DefaultContainer \
                  -p:ContainerRegistry=$(acrLoginServer) \
                  -p:ContainerRepository=rplus-worker \
                  -p:ContainerImageTag=$(Build.BuildId)

          - script: |
              set -euo pipefail
              dotnet tool install --global dotnet-ef --version 9.0.17
              export PATH="$PATH:$HOME/.dotnet/tools"
              # Self-contained bundle: a standalone linux-x64 executable that applies migrations
              # without an SDK at deploy time. Build-time only — uses the design-time factory's
              # placeholder connection; the real connection string is passed with --connection.
              dotnet ef migrations bundle \
                --project src/api/RotationsPlus.Api/RotationsPlus.Api.csproj \
                --startup-project src/api/RotationsPlus.Api/RotationsPlus.Api.csproj \
                --configuration Release --self-contained -r linux-x64 \
                --output "$(Build.ArtifactStagingDirectory)/efbundle/efbundle"
            displayName: Create EF migrations bundle

          - publish: $(Build.ArtifactStagingDirectory)/efbundle
            artifact: efbundle
            displayName: Publish migrations bundle

      - job: frontend
        displayName: Frontend validate
        steps:
          - template: templates/build-frontend.yml

  - stage: deploy
    displayName: Deploy to DEV
    dependsOn: build
    condition: succeeded()
    jobs:
      - deployment: deploydev
        displayName: Provision + deploy
        environment: rplus-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: NodeTool@0
                  displayName: Install Node $(nodeVersion)
                  inputs:
                    versionSpec: $(nodeVersion)

                - task: AzureCLI@2
                  name: infra
                  displayName: Provision infrastructure (Bicep)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      outputs=$(az deployment group create \
                        --resource-group $(resourceGroup) \
                        --template-file infra/bicep/main.bicep \
                        --parameters infra/bicep/main.parameters.dev.bicepparam \
                        --query properties.outputs -o json)
                      apiFqdn=$(echo "$outputs" | jq -r '.apiFqdn.value')
                      swaName=$(echo "$outputs" | jq -r '.swaName.value')
                      swaHost=$(echo "$outputs" | jq -r '.swaDefaultHostname.value')
                      postgresFqdn=$(echo "$outputs" | jq -r '.postgresFqdn.value')
                      echo "API: https://$apiFqdn  SWA: https://$swaHost"
                      echo "##vso[task.setvariable variable=apiFqdn;isOutput=true]$apiFqdn"
                      echo "##vso[task.setvariable variable=swaName;isOutput=true]$swaName"
                      echo "##vso[task.setvariable variable=swaHost;isOutput=true]$swaHost"
                      echo "##vso[task.setvariable variable=postgresFqdn;isOutput=true]$postgresFqdn"
                  env:
                    IMAGE_TAG: $(Build.BuildId)
                    POSTGRES_ADMIN_PASSWORD: $(POSTGRES_ADMIN_PASSWORD)
                    SPA_ALLOWED_ORIGIN: ''

                # Apply EF migrations with the self-contained bundle built in the build stage. The DB
                # now exists (Bicep ran above); the admin password comes from the variable group and
                # the host from the Bicep output — no Key Vault read needed (the pipeline SP has no KV
                # access policy). The Postgres "AllowAllAzureServices" rule lets the hosted agent connect.
                # DEV trade-off: the new image may briefly start before migrations finish (scale-to-zero,
                # negligible traffic). PROD will split infra provisioning from app rollout to order this.
                - download: current
                  artifact: efbundle
                  displayName: Download migrations bundle

                - script: |
                    set -euo pipefail
                    bundle="$(Pipeline.Workspace)/efbundle/efbundle"
                    chmod +x "$bundle"
                    conn="Host=$(infra.postgresFqdn);Port=5432;Database=rotationsplus;Username=rplusadmin;Password=${POSTGRES_ADMIN_PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
                    "$bundle" --connection "$conn"
                  displayName: Apply EF migrations
                  env:
                    POSTGRES_ADMIN_PASSWORD: $(POSTGRES_ADMIN_PASSWORD)

                - task: AzureCLI@2
                  displayName: Build SPA + deploy to Static Web App + open CORS
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      apiFqdn="$(infra.apiFqdn)"
                      swaName="$(infra.swaName)"
                      swaHost="$(infra.swaHost)"

                      export VITE_API_BASE_URL="https://${apiFqdn}"
                      export VITE_AAD_TENANT_ID="$(aadTenantId)"
                      export VITE_AAD_CLIENT_ID="$(aadClientId)"
                      export VITE_API_SCOPE="$(apiScope)"
                      # Staff MSAL redirect target is /admin (the authenticated console root, inside the
                      # StaffMsalShell provider), NOT the site root — "/" is the public, anonymous landing
                      # with no MsalProvider, so a response hash there is never processed. Both this and
                      # the root are registered SPA redirect URIs on rplus-web. (Must include /admin.)
                      export VITE_AAD_REDIRECT_URI="https://${swaHost}/admin"

                      pushd src/frontend/web
                      npm ci
                      npm run build
                      popd

                      token=$(az staticwebapp secrets list --name "$swaName" \
                        --resource-group $(resourceGroup) --query properties.apiKey -o tsv)
                      npx --yes @azure/static-web-apps-cli@latest deploy src/frontend/web/dist \
                        --deployment-token "$token" --env production

                      # Allow the SWA origin on the API now that its host is known.
                      az containerapp update --name ca-rplus-api-dev \
                        --resource-group $(resourceGroup) \
                        --set-env-vars "Cors__AllowedOrigins__0=https://${swaHost}"

                      echo "DEV deployed. SPA: https://${swaHost}  API: https://${apiFqdn}"
